spring:
  application:
    name: coffee-point

  datasource:
    url: jdbc:mysql://localhost:3306/coffee_point?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: coffee
    password: coffee1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: coffee-point-analytics
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.coffeepoint.*"

  cache:
    type: caffeine

server:
  port: 8080

app:
  kafka:
    topic:
      order-completed: order-completed

outbox:
  scheduler:
    rate: 5000
    batch-size: 50

logging:
  level:
    org.hibernate.SQL: debug

springdoc:
  swagger-ui:
    path: /swagger-ui.html
