version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: coffee-point-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: coffee_point
      MYSQL_USER: coffee
      MYSQL_PASSWORD: coffee1234
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: coffee-point-redis
    ports:
      - "6379:6379"

  # ============================================================
  # 부하 테스트 (k6)
  # 실행: docker-compose --profile loadtest run k6
  # ============================================================
  k6:
    image: grafana/k6:latest
    container_name: coffee-point-k6
    profiles: ["loadtest"]
    volumes:
      - ./load-test:/scripts
    environment:
      - BASE_URL=http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 기본: 전체 시나리오 / 변경 가능: /scripts/concurrency-test.js
    command: run /scripts/load-test-v2.js

volumes:
  mysql-data:
