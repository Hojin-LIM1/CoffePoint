version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: coffee-point-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: coffee_point
      MYSQL_USER: coffee
      MYSQL_PASSWORD: coffee1234
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: coffee-point-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data:
