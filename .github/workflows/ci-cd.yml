# ============================================================
# ☕ 커피포인트 v2 — CI/CD Pipeline (AWS ECS Fargate)
#
# 흐름:
#   PR → 테스트 → (merge to main) → Docker Build → ECR Push → ECS 롤링 배포
#
# v2 변경사항:
#   - 테스트 서비스에 Kafka(Redpanda) 추가
#   - Kafka 의존 테스트 포함 (Analytics Consumer, Outbox)
#
# 멀티 인스턴스:
#   ECS desiredCount=3, ALB 분산, 롤링 배포 (minimumHealthy=50%)
#
# 필요한 GitHub Secrets:
#   AWS_ACCESS_KEY_ID        — IAM 사용자 Access Key
#   AWS_SECRET_ACCESS_KEY    — IAM 사용자 Secret Key
#   AWS_REGION               — ap-northeast-2 (서울)
#   AWS_ACCOUNT_ID           — AWS 계정 ID
#   ECR_REPOSITORY           — coffee-point
#   ECS_CLUSTER              — coffee-point-cluster
#   ECS_SERVICE              — coffee-point-service
# ============================================================

name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}

jobs:
  # ============================================================
  # Job 1: 테스트 (PR + Push 공통)
  # ============================================================
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: coffee_point_test
          MYSQL_USER: coffee
          MYSQL_PASSWORD: coffee1234
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      # Kafka (Redpanda — Zookeeper 불필요, CI에 적합)
      kafka:
        image: redpandadata/redpanda:v23.3.5
        ports:
          - 9092:9092
        options: >-
          --health-cmd="rpk cluster health"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s
        env:
          REDPANDA_MODE: dev-container

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 🔧 Grant Gradle Permission
        run: chmod +x ./gradlew

      - name: 🔨 Build
        run: ./gradlew build -x test --no-daemon

      - name: 🧪 Unit & Integration Tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092

      - name: 📊 Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: 📈 Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/

  # ============================================================
  # Job 2: Docker Build + ECR Push (main 브랜치만)
  # ============================================================
  build-and-push:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏷️ Docker Meta
        id: meta
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_TAG="${ECR_REGISTRY}/${ECR_REPOSITORY}:${SHORT_SHA}"
          LATEST_TAG="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "tags=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "latest=${LATEST_TAG}" >> $GITHUB_OUTPUT

      - name: 🐳 Build & Push Docker Image
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tags }}
          LATEST_TAG: ${{ steps.meta.outputs.latest }}
        run: |
          docker build -t $IMAGE_TAG -t $LATEST_TAG .
          docker push $IMAGE_TAG
          docker push $LATEST_TAG
          echo "✅ Pushed: $IMAGE_TAG"

  # ============================================================
  # Job 3: ECS 롤링 배포 (멀티 인스턴스, 무중단)
  # ============================================================
  deploy:
    name: 🚀 Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 📋 Render ECS Task Definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs/task-definition.json
          container-name: coffee-point
          image: ${{ needs.build-and-push.outputs.image-tag }}

      - name: 🚀 Deploy to ECS Service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: ✅ Deploy Complete
        run: |
          echo "🎉 v2 배포 완료!"
          echo "클러스터: ${{ secrets.ECS_CLUSTER }}"
          echo "서비스: ${{ secrets.ECS_SERVICE }}"
          echo "이미지: ${{ needs.build-and-push.outputs.image-tag }}"
          echo ""
          echo "📊 v2 인프라:"
          echo "  ECS Fargate x3 | RDS MySQL | ElastiCache Redis | MSK Kafka"
